<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web App Google Apps Script</title>
    <style>
        /* Memaksa elemen induk di GitHub Pages menghapus semua margin bawaan */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            background-color: #ffffff;
            -webkit-text-size-adjust: 100%;
        }

        /* Container utama yang dipaksa memenuhi layar HP Portrait */
        .wrapper-github {
            position: fixed !important; /* Menggunakan fixed agar tidak terpengaruh struktur tema GitHub */
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 999999; /* Memastikan berada di lapisan paling atas */
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .wrapper-github iframe {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            display: block;
        }
    </style>
</head>
<body>

<div class="wrapper-github">
    <!-- Ganti dengan URL Google Apps Script milikmu -->
    <iframe src="https://script.google.com/macros/s/AKfycbxSTKqaEB4qVBRNNK6V6G8zNpKc4-7isKqiGBietvCx1xaZ_IHEDorVqTuO3-hqd_cZ/exec></iframe>
</div>

</body>
</html>
